name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff -q
          ruff check backend/src/ --output-format=github

      - name: Type check (mypy)
        run: |
          pip install mypy -q
          cd backend && mypy src/ --config-file=mypy.ini

      - name: Test with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pip install pytest-cov -q
          pytest backend/tests/ -v --cov=backend/src --cov-report=xml

      - name: Security audit
        run: |
          pip install pip-audit -q
          pip-audit -r backend/requirements.txt || true

  backend-build:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: haim-mas-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max